<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TamarindBiz" />
  <meta name="theme-color" content="#ffffff" />
  <title>Tamarind Business Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <!-- Apple home screen icon (uses SVG rendered as PNG via CSS) -->
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <!-- Preconnect to Supabase for faster first DB call -->
  <link rel="preconnect" href="https://jnmqjncqwuwfozouynng.supabase.co" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="app.css" />
</head>
<body>

<!-- ====== PIN LOCK SCREEN ====== -->
<div id="pin-screen" class="screen-overlay" style="display:none">
  <div class="pin-box">
    <div class="app-logo">
      <svg width="44" height="44" viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#2E7D32" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="100" cy="80" rx="38" ry="42"/>
          <ellipse cx="76" cy="58" rx="14" ry="18"/>
          <ellipse cx="124" cy="58" rx="14" ry="18"/>
          <path d="M68 95 Q55 130 60 160 Q80 185 100 188 Q120 185 140 160 Q145 130 132 95"/>
          <path d="M85 130 Q100 145 115 130"/>
          <circle cx="88" cy="80" r="4" fill="#2E7D32"/>
          <circle cx="112" cy="80" r="4" fill="#2E7D32"/>
          <path d="M100 100 Q90 120 85 145"/>
          <path d="M100 100 Q105 115 108 118 Q118 125 125 115 Q130 105 120 98"/>
          <path d="M62 95 Q45 80 42 60 Q40 40 55 38 Q68 36 72 52"/>
          <path d="M138 95 Q155 80 158 60 Q160 40 145 38 Q132 36 128 52"/>
        </g>
      </svg>
    </div>
    <h1>Tamarind Business</h1>
    <p class="pin-subtitle" id="pin-subtitle">Enter your PIN</p>
    <div class="pin-dots" id="pin-dots">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="PIN.press(1)">1</button>
      <button class="pin-btn" onclick="PIN.press(2)">2</button>
      <button class="pin-btn" onclick="PIN.press(3)">3</button>
      <button class="pin-btn" onclick="PIN.press(4)">4</button>
      <button class="pin-btn" onclick="PIN.press(5)">5</button>
      <button class="pin-btn" onclick="PIN.press(6)">6</button>
      <button class="pin-btn" onclick="PIN.press(7)">7</button>
      <button class="pin-btn" onclick="PIN.press(8)">8</button>
      <button class="pin-btn" onclick="PIN.press(9)">9</button>
      <button class="pin-btn pin-clear" onclick="PIN.clear()">&#9003;</button>
      <button class="pin-btn" onclick="PIN.press(0)">0</button>
      <button class="pin-btn pin-ok" onclick="PIN.submit()">&#10003;</button>
    </div>
    <p id="pin-error" class="pin-error"></p>
  </div>
</div>

<!-- ====== LOGIN SCREEN ====== -->
<div id="login-screen" class="screen-overlay">
  <div class="login-box">
    <div class="app-logo">
      <svg width="44" height="44" viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#2E7D32" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="100" cy="80" rx="38" ry="42"/>
          <ellipse cx="76" cy="58" rx="14" ry="18"/>
          <ellipse cx="124" cy="58" rx="14" ry="18"/>
          <path d="M68 95 Q55 130 60 160 Q80 185 100 188 Q120 185 140 160 Q145 130 132 95"/>
          <path d="M85 130 Q100 145 115 130"/>
          <circle cx="88" cy="80" r="4" fill="#2E7D32"/>
          <circle cx="112" cy="80" r="4" fill="#2E7D32"/>
          <path d="M100 100 Q90 120 85 145"/>
          <path d="M100 100 Q105 115 108 118 Q118 125 125 115 Q130 105 120 98"/>
          <path d="M62 95 Q45 80 42 60 Q40 40 55 38 Q68 36 72 52"/>
          <path d="M138 95 Q155 80 158 60 Q160 40 145 38 Q132 36 128 52"/>
        </g>
      </svg>
    </div>
    <h1>Tamarind Business</h1>
    <p class="subtitle">Business Tracker</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
    </div>
    <p id="login-error" class="error-text"></p>
    <button class="btn btn-primary btn-full" onclick="AUTH.login()">Login</button>
    <button class="btn btn-link" onclick="AUTH.showSignup()">New user? Sign up</button>
  </div>
</div>

<!-- ====== SIGNUP SCREEN ====== -->
<div id="signup-screen" class="screen-overlay" style="display:none">
  <div class="login-box">
    <div class="app-logo">
      <svg width="44" height="44" viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#2E7D32" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="100" cy="80" rx="38" ry="42"/>
          <ellipse cx="76" cy="58" rx="14" ry="18"/>
          <ellipse cx="124" cy="58" rx="14" ry="18"/>
          <path d="M68 95 Q55 130 60 160 Q80 185 100 188 Q120 185 140 160 Q145 130 132 95"/>
        </g>
      </svg>
    </div>
    <h1>Create Account</h1>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min 6 characters" />
    </div>
    <div class="form-group">
      <label>Business Name</label>
      <input type="text" id="signup-name" placeholder="e.g. Ravi Tamarind Co." />
    </div>
    <p id="signup-error" class="error-text"></p>
    <button class="btn btn-primary btn-full" onclick="AUTH.signup()">Create Account</button>
    <button class="btn btn-link" onclick="AUTH.showLogin()">Already have account? Login</button>
  </div>
</div>

<!-- ====== MAIN APP ====== -->
<div id="main-app" style="display:none">

  <!-- Header -->
  <header class="app-header">
    <button class="hamburger" id="hamburger-btn" onclick="NAV.toggleMenu()" aria-label="Menu">&#9776;</button>
    <span class="header-title" id="header-title">Dashboard</span>
    <button class="header-action" id="header-action-btn" style="visibility:hidden">+</button>
  </header>

  <!-- Slide-out Menu -->
  <nav class="side-menu" id="side-menu">
    <div class="menu-header">
      <div class="menu-logo">
        <svg width="28" height="28" viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="100" cy="80" rx="38" ry="42"/>
            <ellipse cx="76" cy="58" rx="14" ry="18"/>
            <ellipse cx="124" cy="58" rx="14" ry="18"/>
            <path d="M68 95 Q55 130 60 160 Q80 185 100 188 Q120 185 140 160 Q145 130 132 95"/>
            <path d="M62 95 Q45 80 42 60 Q40 40 55 38 Q68 36 72 52"/>
            <path d="M138 95 Q155 80 158 60 Q160 40 145 38 Q132 36 128 52"/>
          </g>
        </svg>
      </div>
      <div>
        <div class="menu-biz-name" id="menu-biz-name">Tamarind Business</div>
        <div class="menu-user-email" id="menu-user-email"></div>
      </div>
    </div>
    <ul class="menu-list">
      <li><button onclick="NAV.go('dashboard')" class="menu-item" data-page="dashboard">
        <span class="menu-item-icon">D</span>Dashboard
      </button></li>
      <li><button onclick="NAV.go('add-entry')" class="menu-item" data-page="add-entry">
        <span class="menu-item-icon">+</span>Add Entry
      </button></li>
      <li><button onclick="NAV.go('parties')" class="menu-item" data-page="parties">
        <span class="menu-item-icon">P</span>Parties
      </button></li>
      <li><button onclick="NAV.go('purchases')" class="menu-item" data-page="purchases">
        <span class="menu-item-icon">B</span>Purchases
      </button></li>
      <li><button onclick="NAV.go('sales')" class="menu-item" data-page="sales">
        <span class="menu-item-icon">S</span>Sales
      </button></li>
      <li><button onclick="NAV.go('expenses')" class="menu-item" data-page="expenses">
        <span class="menu-item-icon">E</span>Expenses
      </button></li>
      <li><button onclick="NAV.go('reports')" class="menu-item" data-page="reports">
        <span class="menu-item-icon">R</span>Reports
      </button></li>
    </ul>
    <div class="menu-footer">
      <button class="btn btn-outline btn-full" onclick="AUTH.logout()">Logout</button>
    </div>
  </nav>
  <div class="menu-overlay" id="menu-overlay" onclick="NAV.closeMenu()"></div>

  <!-- Page Container -->
  <main class="page-container" id="page-container">
    <!-- Pages injected by JS -->
  </main>

  <!-- Toast notifications -->
  <div id="toast" class="toast"></div>

</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/add-entry.js"></script>
<script src="js/parties.js"></script>
<script src="js/lists.js"></script>
<script src="js/reports.js"></script>
<script src="js/app.js"></script>
</body>
</html>

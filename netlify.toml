[build]
  publish = "."

# SPA routing: every path falls back to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Serve service worker with no cache so updates reach users instantly
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cache JS and CSS aggressively (versioned by git deploy)
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/app.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Icons — long cache
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML — always revalidate so new deploys are picked up
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# Manifest — short cache so icon/name changes appear quickly
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
